# https://peps.python.org/pep-0517/
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# https://peps.python.org/pep-0621/
[project]
name = "mcoast"
description = "Molecular counting from a single intensity trace"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "BSD 3-Clause License" }
authors = [
    { email = "teunhuijben@hotmail.com", name = "Teun Huijben" },
]
dynamic = ["version"]
dependencies = [
    "numpy>=1.20.0",
    "scipy>=1.7.0",
    "matplotlib>=3.3.0",
    "scikit-learn>=1.0.0",
]
[tool.hatch.version]
path = "src/mcoast/__init__.py"

[tool.hatch.build.targets.wheel]
only-include = ["src"]

# extras
# https://peps.python.org/pep-0621/#dependencies-optional-dependencies
[project.optional-dependencies]
dev = ["pytest>=6.0", "pre-commit>=4.0.0"]
all = ["mcoast[dev]"]

[project.urls]
homepage = "https://github.com/TeunHuijben/mcoast"
repository = "https://github.com/TeunHuijben/mcoast"
