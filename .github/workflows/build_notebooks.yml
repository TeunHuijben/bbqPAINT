name: Build Jupyter Notebooks

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/mcoast/examples/raw/*.py'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-notebooks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupytext nbconvert nbformat

      - name: Convert jupytext files to notebooks
        run: |
          # Convert each raw Python file to a notebook in the examples directory
          for file in src/mcoast/examples/raw/*.py; do
            filename=$(basename "$file" .py)
            echo "Converting $filename..."

            # Convert to notebook format and place in examples/ directory
            jupytext --to notebook --output "src/mcoast/examples/${filename}.ipynb" "$file"
          done

          echo "✓ All notebooks built successfully"

      - name: List generated notebooks
        run: |
          echo "Generated notebooks:"
          ls -lh src/mcoast/examples/*.ipynb

      - name: Commit and push notebooks
        uses: EndBug/add-and-commit@v9
        with:
          add: 'src/mcoast/examples/*.ipynb'
          message: '🤖 Auto-build Jupyter notebooks from raw examples'
          default_author: github_actions
