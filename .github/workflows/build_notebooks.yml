name: Build Jupyter Notebooks

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/mcoast/examples/raw/*.py'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-notebooks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupytext nbconvert nbformat

      - name: Convert jupytext files to notebooks
        run: |
          mkdir -p src/mcoast/examples/colab

          # Create script to uncomment pip install in colab cells
          cat > /tmp/uncomment_colab.py << 'PYEOF'
          import json, sys
          with open(sys.argv[1], 'r') as f:
              nb = json.load(f)
          for cell in nb['cells']:
              if 'colab' in cell.get('metadata', {}).get('tags', []):
                  cell['source'] = [line.replace('# !pip', '!pip') for line in cell['source']]
          with open(sys.argv[2], 'w') as f:
              json.dump(nb, f, indent=1)
              f.write('\n')
          PYEOF

          for file in src/mcoast/examples/raw/*.py; do
            filename=$(basename "$file" .py)

            # Skip the build helper script itself
            if [ "$filename" = "build_notebooks" ]; then
              continue
            fi

            # Convert to full notebook
            jupytext --to notebook --output "/tmp/${filename}.ipynb" "$file"

            # Normal version (remove colab cells)
            jupyter nbconvert "/tmp/${filename}.ipynb" --TagRemovePreprocessor.enabled=True --TagRemovePreprocessor.remove_cell_tags colab --to notebook --output "${filename}.ipynb" --output-dir src/mcoast/examples

            # Colab version (keep all cells, uncomment pip install)
            python3 /tmp/uncomment_colab.py "/tmp/${filename}.ipynb" "src/mcoast/examples/colab/${filename}.ipynb"
          done

      - name: Commit and push notebooks
        uses: EndBug/add-and-commit@v9
        with:
          add: 'src/mcoast/examples/*.ipynb src/mcoast/examples/colab/*.ipynb'
          message: '🤖 Auto-build Jupyter notebooks'
          default_author: github_actions
